<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>
<link rel="stylesheet" href="style.css">
<script src="main.js" defer></script>
</head>
<body>

<div class="calculator-container">
    <header class="calculator-header">
        <h1>Calculator</h1>
        <div class="header-icons">
            <button id="darkModeToggle">🌙</button> 
        </div>
    </header>

    <div class="calculator">
        <div class="screen">0</div>
        <div class="keypad">
            <button class="key red">C</button>
            <button class="key red">+/-</button>
            <button class="key red">√</button>
            <button class="key dark-grey">%</button>

            <button class="key black">7</button>
            <button class="key black">8</button>
            <button class="key black">9</button>
            <button class="key dark-grey">/</button>

            <button class="key black">4</button>
            <button class="key black">5</button>
            <button class="key black">6</button>
            <button class="key dark-grey">X</button>

            <button class="key black">1</button>
            <button class="key black">2</button>
            <button class="key black">3</button>
            <button class="key dark-grey">-</button>

            <button class="key black double">0</button>
            <button class="key black">.</button>
            <button class="key dark-grey">+</button>
            <button id="l" class="key dark-grey">=</button>
        </div>
    </div>
</div>

</body>
</html>
